<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitPro Express Tracking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="page-shell">
        <h1>TransitPro Express Tracking</h1>

        <!-- Search Input Section -->
        <div class="field-row">
            <label for="trackingInput">Tracking number</label>
            <input type="text" id="trackingInput" placeholder="Enter ID (e.g. TRK101)">
            <button onclick="trackPackage()">Track</button>
        </div>

        <!-- Tracking Results Section (Hidden by default) -->
        <div id="statusResult" class="status-card" style="display: none;">
            <p><strong>Customer:</strong> <span id="display_name">---</span></p>
            <p><strong>Address:</strong> <span id="display_address">---</span></p>
            <p><strong>Status:</strong> <span id="display_status">---</span></p>
            
            <!-- Map Container -->
            <iframe id="map-frame" width="100%" height="250" style="border:0; margin-top:15px; border-radius:12px; display:none;" src="" allowfullscreen></iframe>
            
            <button onclick="resetSearch()" style="margin-top: 20px; background-color: #666; color: white; padding: 10px; border-radius: 8px; border: none; cursor: pointer; width: 100%;">Track Another Package</button>
        </div>

        <!-- Support Section -->
        <footer id="support" class="footer">
            <p>© TransitPro Express 2026 · U.S. Shipment tracking made simple</p>
        </footer>

        <div id="extra-features" class="support-container" style="display: none;">
            <h3>Contact Support</h3>
            <div id="contactForm">
                <input type="text" id="supportName" placeholder="Your Name" style="width: 100%; margin-bottom: 10px; padding: 8px;">
                <input type="email" id="supportEmail" placeholder="Your Email" style="width: 100%; margin-bottom: 10px; padding: 8px;">
                <textarea id="supportMessage" placeholder="How can we help?" style="width: 100%; height: 80px; margin-bottom: 10px; padding: 8px;"></textarea>
                <button onclick="sendEnquiry()" style="background-color: #28a745; color: white; width: 100%; padding: 10px; border: none; cursor: pointer;">Send Enquiry</button>
            </div>
            <div id="supportSuccess" style="display: none; color: green; font-weight: bold; margin-top: 10px;">Message sent successfully!</div>
        </div>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, get, child, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAzoPPlCU-BC5gqU5WFRjlGgrz7UqvPVLc",
    authDomain: "packagetrackingcourierform.firebaseapp.com",
    databaseURL: "https://packagetrackingcourierform-default-rtdb.firebaseio.com",
    projectId: "packagetrackingcourierform",
    storageBucket: "packagetrackingcourierform.firebasestorage.app",
    messagingSenderId: "324365481493",
    appId: "1:324365481493:web:4f2f81967bd9637953801c",
    measurementId: "G-C4K2EBJCJZ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.trackPackage = function() {
    const trackingId = document.getElementById('trackingInput').value.trim();
    if (!trackingId) { alert("Please enter a tracking number."); return; }

    get(child(ref(db), trackingId)).then((snapshot) => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        
        document.getElementById('display_name').innerText = data.customer_name || 'N/A';
        document.getElementById('display_address').innerText = data.customer_address || 'N/A';
        document.getElementById('display_status').innerText = data.status || 'N/A';

        document.querySelector('.field-row').style.display = 'none';
        document.getElementById('statusResult').style.display = 'block';
        document.getElementById('extra-features').style.display = 'block';

        const addr = data.customer_address;
        const mapFrame = document.getElementById('map-frame');
        if (mapFrame && addr && addr !== "N/A") {
            mapFrame.src = "https://www.google.com/maps?q=" + encodeURIComponent(addr) + "&output=embed";
            mapFrame.style.display = 'block';
        }
      } else {
        alert("Tracking ID not found.");
      }
    }).catch(err => alert("Error fetching tracking data: " + err.message));
  };

  window.resetSearch = function() {
    document.querySelector('.field-row').style.display = 'block';
    document.getElementById('statusResult').style.display = 'none';
    document.getElementById('extra-features').style.display = 'none';
    document.getElementById('trackingInput').value = '';
  };

  window.sendEnquiry = function() {
    const name = document.getElementById('supportName').value;
    const email = document.getElementById('supportEmail').value;
    const message = document.getElementById('supportMessage').value;
    if (!name || !email || !message) { alert("Please fill in all fields."); return; }
    
    set(push(ref(db, 'enquiries')), {
      customer_name: name,
      customer_email: email,
      message: message,
      timestamp: new Date().toLocaleString()
    }).then(() => {
      document.getElementById('contactForm').style.display = 'none';
      document.getElementById('supportSuccess').style.display = 'block';
    });
  };
</script>
</body>
</html>
